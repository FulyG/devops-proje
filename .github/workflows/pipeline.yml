name: DevOps Proje Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v3

      - name: Docker Huba giris yap
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker image build et
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-proje:latest .

      - name: Docker Huba push et
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-proje:latest
